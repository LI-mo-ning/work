<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Document</title>
</head>

<body>
  <div class="header">
    <h1>工艺与工序编排平台</h1>
    <p>拖拽左侧工序至右侧编辑区 | 上下拖动工序调整顺序 | 多工艺管理</p>
  </div>

  <div class="dashboard">
    <!-- 左侧：标准工序库 -->
    <div class="card library-panel">
      <div class="card-header">
        <span>标准工序库</span>
        <span style="font-size: 0.75rem; color:#6c86a3;">可拖拽</span>
      </div>
      <div class="card-content">
        <div id="templatesContainer" class="process-templates"></div>
        <div class="add-template-form">
          <input type="text" id="newTemplateName" placeholder="新工序名称, 例如: 质检" maxlength="20">
          <button id="addTemplateBtn">新增工序</button>
        </div>
      </div>
    </div>

    <!-- 中间：工艺列表 -->
    <div class="card processes-panel">
      <div class="card-header">
        <span>工艺列表</span>
        <button id="createProcessBtn" class="add-process-btn">新建工艺</button>
      </div>
      <div class="card-content">
        <div id="processListContainer" class="process-list"></div>
      </div>
    </div>

    <!-- 右侧：工艺编辑区 -->
    <div class="card editor-panel">
      <div class="card-header">
        <span>工艺编辑区</span>
        <span id="activeProcessNameBadge" class="active-process-tag">未选中工艺</span>
      </div>
      <div class="card-content" id="editorContent">
        <div id="stepsContainer" class="steps-container">
          <div class="empty-steps">请从左侧拖拽工序至此，或点击工艺列表切换</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    //创建工艺方法对象数组
    let processMethods = [
      { id: 'M1', name: '切割' },
      { id: 'M2', name: '焊接' },
      { id: 'M3', name: '质检' },
      { id: 'M4', name: '包装' }
    ];
    //工艺列表数组
    let processes = [
      { id: 'P1', name: '工艺1', steps: [] },
      { id: 'P2', name: '工艺2', steps: [] }
    ];
    //当前选中工艺ID
    let activeProcessId = 'P1';
    //本地存储数据
    function saveData() {
      localStorage.setItem('processMethods', JSON.stringify(processMethods));
      localStorage.setItem('processes', JSON.stringify(processes));
      localStorage.setItem('activeProcessId', activeProcessId);
    }

    function loadData() {
      const storedMethods = localStorage.getItem('processMethods');
      const storedProcesses = localStorage.getItem('processes');
      const storedActiveId = localStorage.getItem('activeProcessId');
      if (storedMethods) {
        processMethods = JSON.parse(storedMethods);
      }
      if (storedProcesses) {
        processes = JSON.parse(storedProcesses);
      }
      if (storedActiveId && processes.find(p => p.id === storedActiveId)) {
        activeProcessId = storedActiveId;
      } else if (processes.length > 0) {
        activeProcessId = processes[0].id;
      }
    }
    //渲染工序模板库
    function renderProcessMethods() {
      const container = document.getElementById('templatesContainer');
      container.innerHTML = '';
      processMethods.forEach(method => {
        const div = document.createElement('div');
        div.className = 'process-item';
        div.draggable = true;
        div.dataset.methodId = method.id;
        div.textContent = method.name;
        //拖动事件
        div.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', method.id);
        });
        container.appendChild(div);
      });
    }
    // 渲染工艺列表
    function renderProcessList() {
      const container = document.getElementById('processListContainer');
      // 使用 map + join 方式更简洁
      container.innerHTML = processes.map(process => `
    <div class="process-card ${process.id === activeProcessId ? 'active' : ''}" 
             data-process-id="${process.id}">
          <div class="process-info">
            <span class="process-name-text">${process.name}</span>
            <button class="delete-process-btn" data-id="${process.id}">删除</button>
          </div>
        </div>
      `).join('');
    }

    //渲染当前工艺的工序
    function renderSteps() {
      const process = processes.find(p => p.id === activeProcessId);
      const container = document.getElementById('stepsContainer');
      const badge = document.getElementById('activeProcessNameBadge');
      if (!process) return;
      badge.textContent = process.name;
      if (process.steps.length === 0) {
        container.innerHTML = '<div class="empty-steps">请从左侧拖拽工序至此</div>';
        return;
      }
      //渲染工序列表
      container.innerHTML = process.steps.map((step, index) => `
    <div class="step-item" 
             draggable="true" 
             data-step-id="${step.id}" 
             data-step-index="${index}">
          <span class="step-name">${step.name}</span>
          <button class="delete-step-btn" data-step-id="${step.id}">删除</button>
        </div>
      `).join('');
    }
    //绑定删除按钮
    const stepContainer = document.getElementById('stepsContainer');
    if (stepContainer) {
      stepContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-step-btn')) {
          const stepId = e.target.dataset.stepId;
          deleteStepById(stepId);
        }
      });
      //拖拽排序事件
      stepContainer.addEventListener('dragstart', (e) => {
        const stepItem = e.target.closest('.step-item');
        if (stepItem && stepItem.draggable) {
          handleStepDragStart(e);
        }
      });

      stepsContainer.addEventListener('dragover', (e) => {
        const stepItem = e.target.closest('.step-item');
        if (stepItem) {
          handleStepDragOver(e);
        }
      });

      stepsContainer.addEventListener('dragleave', (e) => {
        const stepItem = e.target.closest('.step-item');
        if (stepItem) {
          handleStepDragLeave(e);
        }
      });

      stepsContainer.addEventListener('drop', (e) => {
        const stepItem = e.target.closest('.step-item');
        if (stepItem) {
          handleStepDrop(e);
        }
      });

      stepsContainer.addEventListener('dragend', (e) => {
        const stepItem = e.target.closest('.step-item');
        if (stepItem) {
          handleStepDragEnd(e);
        }
      });
    }


    // 删除工艺
    function deleteProcess(processId) {
      if (processes.length === 1) {
        alert("至少保留一个工艺");
        return;
      }
      const index = processes.findIndex(p => p.id === processId);
      if (index !== -1) {
        processes.splice(index, 1);
        if (activeProcessId === processId) {
          activeProcessId = processes[0].id;  // 切换到第一个工艺
        }
        renderProcessList();
        renderSteps();  // 刷新右侧
        saveData();
      }
    }

    //删除工序
    function deleteStepById(stepId) {
      const currentProcess = processes.find(p => p.id === activeProcessId);
      if (!currentProcess) return;
      //找到索引
      const stepIndex = currentProcess.steps.findIndex(step => step.id === stepId);
      if (stepIndex !== -1) {
        currentProcess.steps.splice(stepIndex, 1);
        renderSteps();
        saveData();
      }
    }

    //拖拽排序
    let dragSourceStepId = null;
    //记录被拖拽的工序id
    function handleStepDragStart(e) {
      const stepItem = e.target.closest('.step-item')
      if (!stepItem) return;
      dragSourceStepId = stepItem.dataset.stepId;
      e.dataTransfer.setData('text/plain', JSON.stringify({
        type: 'render',
        stepId: dragSourceStepId
      }));
      e.dataTransfer.effectAllowed = 'moved';
      stepItem.style.opacity = '0.5';
    }
    //高亮目标位置
    function handleStepDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const targetItem = e.target.closest('.step-item');
      if (targetItem) {
        targetItem.classList.add('drag-over');
      }
    }
    //拖拽离开
    function handleStepDragLeave(e) {
      const targetItem = e.target.closest('.step-item');
      if (!targetItem) {
        targetItem.classList.remove('drag-over');
      }
    }
    //交换位置
    function handleStepDrop(e) {
      e.preventDefault();
      const targetStep = e.target.closest('.step-item');
      if (!targetStep) return;
      targetStep.classList.remove('drag-over');

      const draggedItem = document.querySelector(`.step-item[data-step-id="${dragSourceStepId}"]`);
      if (draggedItem) {
        draggedItem.style.opacity = '1';
      }

      let dragData;
      try {
        dragData = JSON.parse(e.dataTransfer.getData('text/plain'));
      } catch (err) {
        return;
      }

      if (dragData && dragData.type === 'reorder' && dragData.stepId) {
        const currentProcess = processes.find(p => p.id === activeProcessId);
        if (!currentProcess) return;
        const fromIndex = currentProcess.steps.findIndex(s => s.id === dragData.stepId);
        const toIndex = parseInt(targetStep.dataset.stepIndex);
        if (fromIndex !== -1 && fromIndex !== toIndex) {
          //交换，从数组中删除被拖拽项，插入到目标位置
          const [movedStep] = currentProcess.steps.splice(fromIndex, 1);
          currentProcess.steps.splice(toIndex, 0, movedStep);

          renderSteps();
          saveData();
        }
      }
      dragSourceStepId = null;
    }

    //拖拽结束
    function handleStepDragEnd(e) {
      const stepItem = e.target.closest('.step-item');
      if (stepItem) {
        stepItem.style.opacity = '1';
      }
      // 清除所有高亮
      document.querySelectorAll('.step-item').forEach(el => {
        el.classList.remove('drag-over');
      });
      dragSourceStepId = null;
    }
    // 事件委托：监听工艺列表的所有点击
    document.getElementById('processListContainer').addEventListener('click', (e) => {
      // 处理删除按钮点击
      if (e.target.classList.contains('delete-process-btn')) {
        const processId = e.target.dataset.id;
        deleteProcess(processId);
        return;
      }

      // 处理工艺切换
      const processCard = e.target.closest('.process-card');
      if (processCard) {
        const newProcessId = processCard.dataset.processId;
        if (newProcessId && newProcessId !== activeProcessId) {
          activeProcessId = newProcessId;
          renderProcessList();    // 刷新列表
          renderSteps();          // 刷新右侧工序
        }
      }
    });
    function setupDragAndDrop() {
      const editorZone = document.getElementById('editorContent');
      editorZone.addEventListener('dragover', (e) => {
        //阻止默认行为
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        editorZone.style.backgroundColor = '#f0f7ff';
      });
      editorZone.addEventListener('dragleave', (e) => {
        editorZone.style.backgroundColor = '';
      });
      //放置事件
      editorZone.addEventListener('drop', (e) => {
        e.preventDefault();
        editorZone.style.backgroundColor = '';
        //获取拖拽时保存的数据（工序ID）
        const methodId = e.dataTransfer.getData('text/plain');
        if (!methodId) return;
        //根据ID找到对应的工序方法对象
        const method = processMethods.find(m => m.id === methodId);
        if (!method) return;
        //获取选中的工艺对象
        const currentProcess = processes.find(p => p.id === activeProcessId);
        if (!currentProcess) {
          alert("请先选择一个工艺");
          return;
        };
        //添加工序到当前工艺的步骤列表
        currentProcess.steps.push({
          id: 'step_' + Date.now(), //简单生成唯一ID
          name: method.name
        });
        renderSteps(); //刷新右侧工序显示
        saveData();   //保存数据到本地
        //提示成功添加
        alert(`已将工序 "${method.name}" 添加到 "${currentProcess.name}"`);
      });
    }
    //新增工序
    function setupAddTemplate() {
      const addBtn = document.getElementById('addTemplateBtn');
      const input = document.getElementById('newTemplateName');

      if (addBtn) {
        addBtn.addEventListener('click', () => {
          const newName = input.value.trim();
          if (!newName) {
            alert('请输入工序名称');
            return;
          }
          processMethods.push({
            id: 'M' + Date.now(),
            name: newName
          });
          renderProcessMethods();
          saveData();
          input.value = '';
        });
      }
    }

    //新建工艺
    function setupCreateProcess() {
      const createBtn = document.getElementById('createProcessBtn');
      if (createBtn) {
        createBtn.addEventListener('click', () => {
          let newName = prompt('请输入工艺名称', '新工艺');
          if (!newName || newName.trim() === '') newName = '新工艺';
          processes.push({
            id: 'P' + Date.now(),
            name: newName,
            steps: []
          });
          activeProcessId = processes[processes.length - 1].id;
          renderProcessList();
          renderSteps();
          saveData();
        });
      }
    }

    //初始化
    loadData();
    renderProcessMethods();
    renderProcessList();
    renderSteps();
    setupDragAndDrop();
    setupAddTemplate();
    setupCreateProcess();
  </script>
</body>

</html>
