<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>Document</title>
</head>

<body>
  <div class="header">
    <h1>工艺与工序编排平台</h1>
    <p>拖拽左侧工序至右侧编辑区 | 上下拖动工序调整顺序 | 多工艺管理</p>
  </div>

  <div class="dashboard">
    <!-- 左侧：标准工序库 -->
    <div class="card library-panel">
      <div class="card-header">
        <span>标准工序库</span>
        <span style="font-size: 0.75rem; color:#6c86a3;">可拖拽</span>
      </div>
      <div class="card-content">
        <div id="templatesContainer" class="process-templates"></div>
        <div class="add-template-form">
          <input type="text" id="newTemplateName" placeholder="新工序名称, 例如: 质检" maxlength="20">
          <button id="addTemplateBtn">新增工序</button>
        </div>
      </div>
    </div>

    <!-- 中间：工艺列表 -->
    <div class="card processes-panel">
      <div class="card-header">
        <span>工艺列表</span>
        <button id="createProcessBtn" class="add-process-btn">新建工艺</button>
      </div>
      <div class="card-content">
        <div id="processListContainer" class="process-list"></div>
      </div>
    </div>

    <!-- 右侧：工艺编辑区 -->
    <div class="card editor-panel">
      <div class="card-header">
        <span>工艺编辑区</span>
        <span id="activeProcessNameBadge" class="active-process-tag">未选中工艺</span>
      </div>
      <div class="card-content" id="editorContent">
        <div id="stepsContainer" class="steps-container">
          <div class="empty-steps">请从左侧拖拽工序至此，或点击工艺列表切换</div>
        </div>
      </div>
    </div>
  </div>
  <script src="./index.js"></script>
</body>

</html>
